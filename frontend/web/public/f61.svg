<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <!-- Background Gradient for Cards -->
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0.9" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Global Font Settings -->
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  </style>

  <!-- Title -->
  <text x="40" y="60" fill="#F8FAFC" font-size="28" font-weight="700" letter-spacing="-0.5">Incident Timeline</text>
  <rect x="40" y="80" width="60" height="4" fill="url(#accent)" rx="2" />

  <!-- Left Column: Asset Info & KPI -->
  <rect x="40" y="110" width="320" height="180" rx="16" fill="url(#cardBg)" stroke="#1E293B" stroke-width="1.5" />
  <text x="65" y="150" fill="#94A3B8" font-size="12" font-weight="600" letter-spacing="1">TARGET ASSET</text>
  <text x="65" y="185" fill="#F8FAFC" font-size="24" font-weight="600">Pump P-101</text>
  
  <rect x="65" y="210" width="165" height="28" rx="6" fill="#3B82F6" fill-opacity="0.15" stroke="#3B82F6" stroke-opacity="0.3" stroke-width="1" />
  <circle cx="80" cy="224" r="4" fill="#60A5FA" filter="url(#glow)" />
  <text x="92" y="228" fill="#60A5FA" font-size="11" font-weight="600" letter-spacing="0.5">POTENTIAL FAILURE</text>

  <rect x="40" y="310" width="150" height="120" rx="16" fill="url(#cardBg)" stroke="#1E293B" stroke-width="1.5" />
  <text x="65" y="345" fill="#94A3B8" font-size="12" font-weight="600">VIBRATION</text>
  <text x="65" y="380" fill="#60A5FA" font-size="28" font-weight="700">12.4</text>
  <text x="130" y="375" fill="#64748B" font-size="14" font-weight="500">mm/s</text>
  <rect x="65" y="395" width="100" height="4" rx="2" fill="#1E293B" />
  <rect x="65" y="395" width="85" height="4" rx="2" fill="#3B82F6" />

  <rect x="210" y="310" width="150" height="120" rx="16" fill="url(#cardBg)" stroke="#1E293B" stroke-width="1.5" />
  <text x="235" y="345" fill="#94A3B8" font-size="12" font-weight="600">TEMPERATURE</text>
  <text x="235" y="380" fill="#F8FAFC" font-size="28" font-weight="700">85°</text>
  <text x="285" y="375" fill="#64748B" font-size="14" font-weight="500">C</text>
  <rect x="235" y="395" width="100" height="4" rx="2" fill="#1E293B" />
  <rect x="235" y="395" width="70" height="4" rx="2" fill="#94A3B8" />

  <!-- Right Column: Timeline -->
  <rect x="390" y="110" width="370" height="400" rx="16" fill="url(#cardBg)" stroke="#1E293B" stroke-width="1.5" />
  
  <line x1="435" y1="150" x2="435" y2="470" stroke="#334155" stroke-width="2" stroke-dasharray="4" />

  <!-- Node 1 -->
  <circle cx="435" cy="170" r="6" fill="#3B82F6" filter="url(#glow)" />
  <text x="465" y="165" fill="#60A5FA" font-size="12" font-weight="600">08:42 AM · TODAY</text>
  <text x="465" y="185" fill="#F8FAFC" font-size="15" font-weight="500">Alarm generated (High Vibration)</text>
  <rect x="465" y="200" width="260" height="30" rx="6" fill="#1E293B" fill-opacity="0.5" stroke="#334155" stroke-width="1" />
  <text x="477" y="219" fill="#94A3B8" font-size="12">Source: SCADA / Historian Tag V-101A</text>

  <!-- Node 2 -->
  <circle cx="435" cy="265" r="5" fill="#475569" stroke="#94A3B8" stroke-width="2" />
  <text x="465" y="260" fill="#94A3B8" font-size="12" font-weight="600">18:30 PM · YESTERDAY</text>
  <text x="465" y="280" fill="#CBD5E1" font-size="15" font-weight="500">Operator email ignored</text>
  <rect x="465" y="295" width="260" height="30" rx="6" fill="#1E293B" fill-opacity="0.5" stroke="#334155" stroke-width="1" />
  <text x="477" y="314" fill="#94A3B8" font-size="12">Subject: "P-101 sounding rough on shift"</text>

  <!-- Node 3 -->
  <circle cx="435" cy="360" r="5" fill="#475569" stroke="#94A3B8" stroke-width="2" />
  <text x="465" y="355" fill="#94A3B8" font-size="12" font-weight="600">14 DAYS AGO</text>
  <text x="465" y="375" fill="#CBD5E1" font-size="15" font-weight="500">Maintenance work order pending</text>
  <rect x="465" y="390" width="260" height="30" rx="6" fill="#1E293B" fill-opacity="0.5" stroke="#334155" stroke-width="1" />
  <text x="477" y="409" fill="#94A3B8" font-size="12">WO-20491: Seal replacement</text>

  <!-- Node 4 -->
  <circle cx="435" cy="455" r="5" fill="#475569" stroke="#94A3B8" stroke-width="2" />
  <text x="465" y="450" fill="#94A3B8" font-size="12" font-weight="600">30 DAYS AGO</text>
  <text x="465" y="470" fill="#CBD5E1" font-size="15" font-weight="500">Last inspection overdue</text>

</svg>
