<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <!-- Background Gradient for Cards -->
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0.9" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <linearGradient id="successBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#064E3B" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#022C22" stop-opacity="0.8" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Global Font Settings -->
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  </style>

  <!-- Title -->
  <text x="40" y="60" fill="#F8FAFC" font-size="28" font-weight="700" letter-spacing="-0.5">Root Cause &amp; Resolution</text>
  <rect x="40" y="80" width="60" height="4" fill="url(#accent)" rx="2" />

  <!-- Top Full Width: Root Cause -->
  <rect x="40" y="110" width="720" height="100" rx="16" fill="url(#cardBg)" stroke="#1E293B" stroke-width="1.5" />
  <rect x="65" y="130" width="40" height="40" rx="8" fill="#3B82F6" fill-opacity="0.15" />
  <!-- Simple Magnifying Glass Icon -->
  <circle cx="83" cy="148" r="8" stroke="#60A5FA" stroke-width="2" fill="none" />
  <line x1="89" y1="154" x2="95" y2="160" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" />
  
  <text x="125" y="145" fill="#94A3B8" font-size="12" font-weight="600" letter-spacing="1">ROOT CAUSE IDENTIFIED</text>
  <text x="125" y="175" fill="#F8FAFC" font-size="20" font-weight="500">Mechanical seal degradation caused by delayed preventive maintenance.</text>

  <!-- Left Column: Actions Taken -->
  <rect x="40" y="230" width="350" height="200" rx="16" fill="url(#cardBg)" stroke="#1E293B" stroke-width="1.5" />
  <text x="65" y="265" fill="#F8FAFC" font-size="16" font-weight="600">Actions Taken automatically</text>
  <line x1="65" y1="280" x2="365" y2="280" stroke="#1E293B" stroke-width="1.5" />

  <!-- Action 1 -->
  <circle cx="75" cy="310" r="10" fill="#3B82F6" fill-opacity="0.2" stroke="#3B82F6" />
  <path d="M70 310 L74 314 L80 306" stroke="#3B82F6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="100" y="315" fill="#CBD5E1" font-size="15" font-weight="500">Maintenance scheduled <tspan fill="#64748B">(WO-20492)</tspan></text>

  <!-- Action 2 -->
  <circle cx="75" cy="350" r="10" fill="#3B82F6" fill-opacity="0.2" stroke="#3B82F6" />
  <path d="M70 350 L74 354 L80 346" stroke="#3B82F6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="100" y="355" fill="#CBD5E1" font-size="15" font-weight="500">Compliance evidence generated</text>

  <!-- Action 3 -->
  <circle cx="75" cy="390" r="10" fill="#3B82F6" fill-opacity="0.2" stroke="#3B82F6" />
  <path d="M70 390 L74 394 L80 386" stroke="#3B82F6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="100" y="395" fill="#CBD5E1" font-size="15" font-weight="500">SOP-9 updated with new interval</text>

  <!-- Right Column: Business Impact -->
  <rect x="410" y="230" width="350" height="200" rx="16" fill="url(#cardBg)" stroke="#1E293B" stroke-width="1.5" />
  <text x="435" y="265" fill="#F8FAFC" font-size="16" font-weight="600">Business Impact</text>
  <line x1="435" y1="280" x2="735" y2="280" stroke="#1E293B" stroke-width="1.5" />

  <rect x="435" y="300" width="300" height="80" rx="12" fill="#020617" stroke="#1E293B" stroke-width="1" />
  <text x="455" y="330" fill="#94A3B8" font-size="12" font-weight="600">DOWNTIME PREVENTED</text>
  <text x="455" y="360" fill="#10B981" font-size="28" font-weight="700">- 14 hrs</text>
  <text x="615" y="330" fill="#94A3B8" font-size="12" font-weight="600">COST SAVINGS</text>
  <text x="615" y="360" fill="#10B981" font-size="28" font-weight="700">₹8.2L</text>

  <rect x="435" y="390" width="300" height="20" rx="4" fill="transparent" />
  <circle cx="445" cy="400" r="4" fill="#10B981" filter="url(#glow)"/>
  <text x="460" y="405" fill="#10B981" font-size="14" font-weight="600">Regulatory Compliance Restored</text>


  <!-- Bottom Full Width: Knowledge Graph Update -->
  <rect x="40" y="450" width="720" height="80" rx="16" fill="url(#successBg)" stroke="#059669" stroke-width="1.5" stroke-opacity="0.3" />
  
  <rect x="65" y="465" width="200" height="50" rx="8" fill="#1E293B" fill-opacity="0.2" />
  <circle cx="85" cy="490" r="8" fill="#10B981" fill-opacity="0.2" stroke="#10B981" />
  <path d="M82 490 L84 492 L88 488" stroke="#10B981" stroke-width="2" fill="none" />
  <text x="105" y="495" fill="#D1FAE5" font-size="14" font-weight="500">Knowledge Graph Updated</text>

  <rect x="285" y="465" width="200" height="50" rx="8" fill="#1E293B" fill-opacity="0.2" />
  <circle cx="305" cy="490" r="8" fill="#10B981" fill-opacity="0.2" stroke="#10B981" />
  <path d="M302 490 L304 492 L308 488" stroke="#10B981" stroke-width="2" fill="none" />
  <text x="325" y="495" fill="#D1FAE5" font-size="14" font-weight="500">Lessons Learned Stored</text>

  <rect x="505" y="465" width="230" height="50" rx="8" fill="#1E293B" fill-opacity="0.2" />
  <circle cx="525" cy="490" r="8" fill="#3B82F6" filter="url(#glow)" />
  <text x="545" y="495" fill="#93C5FD" font-size="14" font-weight="600">Future similar incidents detectable</text>
</svg>
