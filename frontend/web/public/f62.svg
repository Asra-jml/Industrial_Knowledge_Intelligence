<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <!-- Background Gradient for Cards -->
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#020617" stop-opacity="0.9" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <!-- Node Gradient -->
    <linearGradient id="nodeBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.95" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Global Font Settings -->
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  </style>

  <!-- Title -->
  <text x="40" y="60" fill="#F8FAFC" font-size="28" font-weight="700" letter-spacing="-0.5">Golden Thread Analysis</text>
  <rect x="40" y="80" width="60" height="4" fill="url(#accent)" rx="2" />

  <!-- Left/Center: Knowledge Graph -->
  <!-- Edges -->
  <!-- Center: 240, 310 -->
  <line x1="240" y1="310" x2="120" y2="200" stroke="#334155" stroke-width="2" />
  <line x1="240" y1="310" x2="240" y2="150" stroke="#3B82F6" stroke-width="2" filter="url(#softGlow)" />
  <line x1="240" y1="310" x2="360" y2="200" stroke="#334155" stroke-width="2" />
  <line x1="240" y1="310" x2="100" y2="310" stroke="#334155" stroke-width="2" />
  <line x1="240" y1="310" x2="380" y2="310" stroke="#3B82F6" stroke-width="2" filter="url(#softGlow)" />
  <line x1="240" y1="310" x2="120" y2="420" stroke="#334155" stroke-width="2" />
  <line x1="240" y1="310" x2="240" y2="470" stroke="#3B82F6" stroke-width="2" filter="url(#softGlow)" />
  <line x1="240" y1="310" x2="360" y2="420" stroke="#3B82F6" stroke-width="2" filter="url(#softGlow)" />

  <!-- Nodes -->
  <!-- Top Left: P&ID -->
  <circle cx="120" cy="200" r="28" fill="url(#nodeBg)" stroke="#334155" stroke-width="1.5" />
  <text x="120" y="195" fill="#94A3B8" font-size="10" font-weight="600" text-anchor="middle">P&amp;ID</text>
  <text x="120" y="210" fill="#CBD5E1" font-size="12" font-weight="500" text-anchor="middle">Drawing</text>

  <!-- Top Center: Maint Records (Highlighted) -->
  <circle cx="240" cy="150" r="32" fill="url(#nodeBg)" stroke="#3B82F6" stroke-width="2" filter="url(#softGlow)" />
  <text x="240" y="145" fill="#60A5FA" font-size="10" font-weight="600" text-anchor="middle">WO-20491</text>
  <text x="240" y="160" fill="#F8FAFC" font-size="12" font-weight="500" text-anchor="middle">Pending</text>

  <!-- Top Right: Inspection -->
  <circle cx="360" cy="200" r="28" fill="url(#nodeBg)" stroke="#334155" stroke-width="1.5" />
  <text x="360" y="195" fill="#94A3B8" font-size="10" font-weight="600" text-anchor="middle">INSP</text>
  <text x="360" y="210" fill="#CBD5E1" font-size="12" font-weight="500" text-anchor="middle">Overdue</text>

  <!-- Left: Sensor History -->
  <circle cx="100" cy="310" r="30" fill="url(#nodeBg)" stroke="#334155" stroke-width="1.5" />
  <text x="100" y="305" fill="#94A3B8" font-size="10" font-weight="600" text-anchor="middle">V-101A</text>
  <text x="100" y="320" fill="#CBD5E1" font-size="12" font-weight="500" text-anchor="middle">Historian</text>

  <!-- Right: SOP (Highlighted) -->
  <circle cx="380" cy="310" r="32" fill="url(#nodeBg)" stroke="#3B82F6" stroke-width="2" filter="url(#softGlow)" />
  <text x="380" y="305" fill="#60A5FA" font-size="10" font-weight="600" text-anchor="middle">SOP-9</text>
  <text x="380" y="320" fill="#F8FAFC" font-size="12" font-weight="500" text-anchor="middle">Procedure</text>

  <!-- Bottom Left: Emails -->
  <circle cx="120" cy="420" r="28" fill="url(#nodeBg)" stroke="#334155" stroke-width="1.5" />
  <text x="120" y="415" fill="#94A3B8" font-size="10" font-weight="600" text-anchor="middle">Outlook</text>
  <text x="120" y="430" fill="#CBD5E1" font-size="12" font-weight="500" text-anchor="middle">Email</text>

  <!-- Bottom Center: Lessons Learned (Highlighted) -->
  <circle cx="240" cy="470" r="34" fill="url(#nodeBg)" stroke="#3B82F6" stroke-width="2" filter="url(#softGlow)" />
  <text x="240" y="465" fill="#60A5FA" font-size="10" font-weight="600" text-anchor="middle">INC-22</text>
  <text x="240" y="480" fill="#F8FAFC" font-size="12" font-weight="500" text-anchor="middle">Similar Fail</text>

  <!-- Bottom Right: OEM Manual (Highlighted) -->
  <circle cx="360" cy="420" r="32" fill="url(#nodeBg)" stroke="#3B82F6" stroke-width="2" filter="url(#softGlow)" />
  <text x="360" y="415" fill="#60A5FA" font-size="10" font-weight="600" text-anchor="middle">OEM</text>
  <text x="360" y="430" fill="#F8FAFC" font-size="12" font-weight="500" text-anchor="middle">Interval</text>

  <!-- Center Asset Node -->
  <circle cx="240" cy="310" r="48" fill="#1E293B" stroke="#60A5FA" stroke-width="3" filter="url(#glow)" />
  <text x="240" y="305" fill="#F8FAFC" font-size="16" font-weight="700" text-anchor="middle">Pump</text>
  <text x="240" y="325" fill="#60A5FA" font-size="14" font-weight="600" text-anchor="middle">P-101</text>

  <!-- Right Column: AI Findings -->
  <rect x="440" y="110" width="320" height="400" rx="16" fill="url(#cardBg)" stroke="#1E293B" stroke-width="1.5" />
  
  <!-- AI Header -->
  <rect x="465" y="140" width="270" height="60" rx="12" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-opacity="0.3" stroke-width="1" />
  <text x="485" y="165" fill="#94A3B8" font-size="12" font-weight="600" letter-spacing="1">AI CORRELATION</text>
  <text x="485" y="185" fill="#F8FAFC" font-size="18" font-weight="600">Golden Thread Found</text>
  
  <text x="670" y="162" fill="#60A5FA" font-size="28" font-weight="700">97%</text>
  <text x="672" y="178" fill="#3B82F6" font-size="10" font-weight="600">CONFIDENCE</text>

  <!-- Findings List -->
  <!-- Finding 1 -->
  <rect x="465" y="230" width="270" height="50" rx="8" fill="#1E293B" fill-opacity="0.4" stroke="#334155" stroke-width="1" />
  <circle cx="485" cy="255" r="8" fill="#10B981" fill-opacity="0.2" stroke="#10B981" />
  <path d="M482 255 L484 257 L488 253" stroke="#10B981" stroke-width="2" fill="none" />
  <text x="505" y="260" fill="#CBD5E1" font-size="14" font-weight="500">Missed monthly inspection</text>

  <!-- Finding 2 -->
  <rect x="465" y="295" width="270" height="50" rx="8" fill="#1E293B" fill-opacity="0.4" stroke="#334155" stroke-width="1" />
  <circle cx="485" cy="320" r="8" fill="#10B981" fill-opacity="0.2" stroke="#10B981" />
  <path d="M482 320 L484 322 L488 318" stroke="#10B981" stroke-width="2" fill="none" />
  <text x="505" y="325" fill="#CBD5E1" font-size="14" font-weight="500">Similar failure 11 months ago</text>

  <!-- Finding 3 -->
  <rect x="465" y="360" width="270" height="50" rx="8" fill="#1E293B" fill-opacity="0.4" stroke="#3B82F6" stroke-width="1" />
  <circle cx="485" cy="385" r="8" fill="#3B82F6" fill-opacity="0.2" stroke="#3B82F6" />
  <path d="M482 385 L484 387 L488 383" stroke="#3B82F6" stroke-width="2" fill="none" />
  <text x="505" y="390" fill="#F8FAFC" font-size="14" font-weight="500">SOP deviation detected</text>

  <!-- Finding 4 -->
  <rect x="465" y="425" width="270" height="50" rx="8" fill="#1E293B" fill-opacity="0.4" stroke="#3B82F6" stroke-width="1" />
  <circle cx="485" cy="450" r="8" fill="#3B82F6" fill-opacity="0.2" stroke="#3B82F6" />
  <path d="M482 450 L484 452 L488 448" stroke="#3B82F6" stroke-width="2" fill="none" />
  <text x="505" y="455" fill="#F8FAFC" font-size="14" font-weight="500">OEM maintenance interval exceeded</text>

</svg>
